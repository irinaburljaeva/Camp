<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ШАГАЙ ДОМА — Лови цветы 🌸</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: linear-gradient(135deg, #FFF8E5 0%, #FFE8B3 100%);
    font-family: 'Arial', sans-serif;
    text-align: center;
    padding: 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

h1 {
    color: #CF2C02;
    font-size: 2.2em;
    margin-bottom: 10px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
}

.subtitle {
    color: #666;
    font-size: 1em;
    margin-bottom: 20px;
}

.game-container {
    position: relative;
    display: inline-block;
}

canvas {
    background: linear-gradient(180deg, #E8F5FF 0%, #FFF8E5 100%);
    border: 5px solid #CF2C02;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(207, 44, 2, 0.3);
    display: block;
}

.controls {
    margin-top: 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 15px;
    max-width: 300px;
    margin-left: auto;
    margin-right: auto;
}

.control-btn {
    padding: 20px;
    font-size: 18px;
    background: linear-gradient(135deg, #FFDE59, #FF9F1C);
    border: 3px solid #CF2C02;
    border-radius: 15px;
    color: #78350f;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(255, 159, 28, 0.4);
    transition: all 0.2s ease;
    touch-action: manipulation;
}

.control-btn:active {
    transform: translateY(2px);
    box-shadow: 0 2px 8px rgba(255, 159, 28, 0.4);
}

.control-btn.active {
    background: linear-gradient(135deg, #CF2C02, #FF9F1C);
    color: white;
}

#overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(207, 44, 2, 0.95);
    color: white;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    font-size: 24px;
    border-radius: 20px;
    z-index: 10;
}

#overlay.show {
    display: flex;
}

.overlay-title {
    font-size: 36px;
    font-weight: bold;
    margin-bottom: 20px;
}

.overlay-text {
    font-size: 20px;
    margin: 10px 0;
    max-width: 300px;
}

button {
    padding: 15px 35px;
    font-size: 20px;
    margin-top: 20px;
    background: linear-gradient(135deg, #FFDE59, #FF9F1C);
    border: none;
    border-radius: 50px;
    color: #78350f;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(255, 159, 28, 0.4);
    transition: all 0.3s ease;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 25px rgba(255, 159, 28, 0.5);
}

.stats {
    margin-top: 20px;
    display: flex;
    gap: 30px;
    justify-content: center;
    font-size: 18px;
    color: #CF2C02;
}

.stat-item {
    background: white;
    padding: 10px 20px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

@media (max-width: 480px) {
    canvas {
        width: 100%;
        max-width: 350px;
        height: auto;
    }
    
    h1 {
        font-size: 1.5em;
    }
}
</style>
</head>

<body>

<h1>🌸 ШАГАЙ ДОМА — Лови цветы</h1>
<p class="subtitle">Перемещайся по 4 позициям и лови цветы!</p>

<div class="game-container">
    <canvas id="game" width="600" height="500"></canvas>
    
    <div id="overlay">
        <div class="overlay-title">⏸️ Пауза на шаги!</div>
        <div class="overlay-text">
            Чтобы продолжить игру — пошагайте на месте
        </div>
        <div class="overlay-text" style="font-size:48px; color:#FFDE59; margin:20px 0;">
            50 шагов
        </div>
        <button onclick="resumeGame()">Я пошагала 👣 Продолжить!</button>
    </div>
</div>

<div class="controls">
    <button class="control-btn" id="btn-tl" onmousedown="setPosition(0)" onmouseup="clearActive()" ontouchstart="setPosition(0)" ontouchend="clearActive()">
        ↖️ Верх-Лево<br><small>Q</small>
    </button>
    <button class="control-btn" id="btn-tr" onmousedown="setPosition(1)" onmouseup="clearActive()" ontouchstart="setPosition(1)" ontouchend="clearActive()">
        ↗️ Верх-Право<br><small>W</small>
    </button>
    <button class="control-btn" id="btn-bl" onmousedown="setPosition(2)" onmouseup="clearActive()" ontouchstart="setPosition(2)" ontouchend="clearActive()">
        ↙️ Низ-Лево<br><small>A</small>
    </button>
    <button class="control-btn" id="btn-br" onmousedown="setPosition(3)" onmouseup="clearActive()" ontouchstart="setPosition(3)" ontouchend="clearActive()">
        ↘️ Низ-Право<br><small>S</small>
    </button>
</div>

<div class="stats">
    <div class="stat-item">
        🏆 Рекорд: <span id="bestScore">0</span>
    </div>
    <div class="stat-item">
        🔥 Уровень: <span id="level">1</span>
    </div>
</div>

<p style="margin-top:20px; color:#666; font-size:14px;">
    💡 Управление: Q-W-A-S или кнопки<br>
    🎯 Лови цветы в 4 позициях — не упусти ни одного!
</p>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let score = 0;
let lives = 3;
let level = 1;
let bestScore = parseInt(localStorage.getItem('flowerGameBest')) || 0;
let isPaused = false;
let gameSpeed = 1;
let currentPosition = 2; // 0=TL, 1=TR, 2=BL, 3=BR

document.getElementById('bestScore').textContent = bestScore;
document.getElementById('level').textContent = level;

// Позиции персонажа (корзины)
const positions = [
    { x: 100, y: 150 },  // Top-Left
    { x: 450, y: 150 },  // Top-Right
    { x: 100, y: 350 },  // Bottom-Left
    { x: 450, y: 350 }   // Bottom-Right
];

// Желоба для цветов
const lanes = [
    { startX: 50, startY: 20, endX: 120, endY: 180, position: 0 },   // TL
    { startX: 550, startY: 20, endX: 480, endY: 180, position: 1 },  // TR
    { startX: 50, startY: 480, endX: 120, endY: 380, position: 2 },  // BL
    { startX: 550, startY: 480, endX: 480, endY: 380, position: 3 }  // BR
];

let flowers = [];

const flowerEmojis = ['🌸', '🌺', '🌻', '🌼', '🌷'];

function spawnFlower() {
    if (isPaused) return;
    
    const lane = lanes[Math.floor(Math.random() * 4)];
    const emoji = flowerEmojis[Math.floor(Math.random() * flowerEmojis.length)];
    
    flowers.push({
        lane: lane.position,
        progress: 0,
        speed: (0.8 + Math.random() * 0.4) * gameSpeed,
        emoji: emoji,
        caught: false
    });
}

// Спавн цветов
setInterval(spawnFlower, 1500 / gameSpeed);

// Управление клавиатурой
document.addEventListener("keydown", function(e) {
    if (isPaused) return;
    
    const key = e.key.toLowerCase();
    if (key === 'q') setPosition(0);
    if (key === 'w') setPosition(1);
    if (key === 'a') setPosition(2);
    if (key === 's') setPosition(3);
});

document.addEventListener("keyup", clearActive);

function setPosition(pos) {
    if (isPaused) return;
    currentPosition = pos;
    
    // Визуальная подсветка
    document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active'));
    const buttons = ['btn-tl', 'btn-tr', 'btn-bl', 'btn-br'];
    document.getElementById(buttons[pos]).classList.add('active');
}

function clearActive() {
    document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active'));
}

function drawPlayer() {
    const pos = positions[currentPosition];
    
    // Рисуем корзину
    ctx.fillStyle = "#CF2C02";
    ctx.strokeStyle = "#8B1E00";
    ctx.lineWidth = 3;
    
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, 35, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    
    // Детали корзины
    ctx.fillStyle = "#FFF";
    ctx.font = "40px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("🧺", pos.x, pos.y);
}

function drawLanes() {
    ctx.strokeStyle = "rgba(207, 44, 2, 0.2)";
    ctx.lineWidth = 2;
    ctx.setLineDash([5, 5]);
    
    lanes.forEach(lane => {
        ctx.beginPath();
        ctx.moveTo(lane.startX, lane.startY);
        ctx.lineTo(lane.endX, lane.endY);
        ctx.stroke();
    });
    
    ctx.setLineDash([]);
}

function drawFlowers() {
    ctx.font = "30px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    
    flowers.forEach((flower, i) => {
        if (flower.caught) return;
        
        const lane = lanes[flower.lane];
        flower.progress += flower.speed;
        
        // Интерполяция по желобу
        const t = flower.progress / 100;
        const x = lane.startX + (lane.endX - lane.startX) * t;
        const y = lane.startY + (lane.endY - lane.startY) * t;
        
        ctx.fillText(flower.emoji, x, y);
        
        // Проверка поимки (когда цветок достиг конца желоба)
        if (flower.progress >= 100) {
            if (currentPosition === flower.lane) {
                // Поймали!
                score++;
                flower.caught = true;
                
                if (score > bestScore) {
                    bestScore = score;
                    localStorage.setItem('flowerGameBest', bestScore);
                    document.getElementById('bestScore').textContent = bestScore;
                }
                
                // Увеличение уровня
                if (score % 15 === 0) {
                    level = Math.floor(score / 15) + 1;
                    gameSpeed = 1 + (level - 1) * 0.15;
                    document.getElementById('level').textContent = level;
                }
            } else {
                // Упустили
                lives--;
                flower.caught = true;
                
                if (lives <= 0) {
                    pauseGame();
                }
            }
        }
        
        // Удаляем пойманные цветы
        if (flower.caught) {
            flowers.splice(i, 1);
        }
    });
}

function drawUI() {
    ctx.fillStyle = "#CF2C02";
    ctx.font = "bold 24px Arial";
    ctx.textAlign = "left";
    
    // Очки
    ctx.fillText("🏆 " + score, 20, 40);
    
    // Жизни
    ctx.textAlign = "right";
    ctx.fillText("❤️ ".repeat(lives), canvas.width - 20, 40);
    
    // Уровень
    ctx.textAlign = "center";
    ctx.fillStyle = "#FF9F1C";
    ctx.fillText("Уровень " + level, canvas.width / 2, 40);
}

function update() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    if (!isPaused) {
        drawLanes();
        drawFlowers();
        drawPlayer();
    }
    
    drawUI();
    
    requestAnimationFrame(update);
}

function pauseGame() {
    isPaused = true;
    document.getElementById("overlay").classList.add("show");
}

function resumeGame() {
    lives = 3;
    isPaused = false;
    document.getElementById("overlay").classList.remove("show");
}

update();
</script>

</body>
</html>
