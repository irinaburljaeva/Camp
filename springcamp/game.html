<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ШАГАЙ ДОМА — Лови цветы 🌸</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: linear-gradient(135deg, #d4a574 0%, #c9965f 100%);
    font-family: 'Arial', sans-serif;
    text-align: center;
    padding: 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

h1 {
    color: #8B4513;
    font-size: 2em;
    margin-bottom: 15px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
}

.game-wrapper {
    background: linear-gradient(135deg, #e8d4b8 0%, #d4c4a8 100%);
    padding: 30px;
    border-radius: 30px;
    box-shadow: 
        inset 0 0 30px rgba(0,0,0,0.1),
        0 15px 50px rgba(0,0,0,0.4);
    border: 8px solid #8B6F47;
}

.screen-border {
    background: #2a2a2a;
    padding: 15px;
    border-radius: 20px;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
}

canvas {
    background: linear-gradient(180deg, #b8c5d0 0%, #a8b5c0 50%, #98a5b0 100%);
    border: 3px solid #1a1a1a;
    border-radius: 10px;
    display: block;
    box-shadow: 
        inset 0 2px 10px rgba(0,0,0,0.3),
        0 0 30px rgba(255,255,255,0.1);
}

.game-title {
    background: #2a2a2a;
    color: #d4a574;
    padding: 10px 30px;
    margin-bottom: 15px;
    border-radius: 10px;
    font-size: 20px;
    font-weight: bold;
    letter-spacing: 3px;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
}

.controls-panel {
    display: flex;
    justify-content: space-between;
    margin-top: 25px;
    gap: 30px;
}

.control-side {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.control-btn {
    width: 80px;
    height: 80px;
    background: radial-gradient(circle at 30% 30%, #d64545, #a03030);
    border: 5px solid #7a7a7a;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 
        0 8px 15px rgba(0,0,0,0.4),
        inset 0 -3px 8px rgba(0,0,0,0.3),
        inset 0 3px 8px rgba(255,255,255,0.2);
    transition: all 0.1s ease;
    position: relative;
    touch-action: manipulation;
}

.control-btn:active {
    transform: translateY(3px);
    box-shadow: 
        0 4px 8px rgba(0,0,0,0.4),
        inset 0 2px 10px rgba(0,0,0,0.5);
}

.control-btn::before {
    content: '';
    position: absolute;
    top: 15%;
    left: 15%;
    width: 30%;
    height: 30%;
    background: radial-gradient(circle, rgba(255,255,255,0.4), transparent);
    border-radius: 50%;
}

.arrow-indicator {
    position: absolute;
    font-size: 24px;
    color: #333;
}

.arrow-top { top: -30px; left: 50%; transform: translateX(-50%); }
.arrow-bottom { bottom: -30px; left: 50%; transform: translateX(-50%); }

#overlay {
    position: absolute;
    top: 15px;
    left: 15px;
    right: 15px;
    bottom: 15px;
    background: rgba(42, 42, 42, 0.95);
    color: #d4a574;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    font-size: 24px;
    border-radius: 10px;
    z-index: 10;
}

#overlay.show {
    display: flex;
}

.overlay-title {
    font-size: 36px;
    font-weight: bold;
    margin-bottom: 20px;
    color: #FF9F1C;
}

.resume-btn {
    padding: 15px 35px;
    font-size: 20px;
    margin-top: 20px;
    background: radial-gradient(circle at 30% 30%, #d64545, #a03030);
    border: 3px solid #7a7a7a;
    border-radius: 50px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    transition: all 0.2s ease;
}

.resume-btn:active {
    transform: translateY(2px);
}

.stats {
    margin-top: 20px;
    display: flex;
    gap: 20px;
    justify-content: center;
    font-size: 16px;
    color: #2a2a2a;
}

.stat-item {
    background: rgba(255,255,255,0.3);
    padding: 8px 15px;
    border-radius: 10px;
    border: 2px solid #8B6F47;
    font-weight: bold;
}

@media (max-width: 768px) {
    .game-wrapper {
        padding: 15px;
    }
    
    canvas {
        width: 100%;
        max-width: 500px;
        height: auto;
    }
    
    .control-btn {
        width: 60px;
        height: 60px;
    }
}
</style>
</head>

<body>

<h1>ШАГАЙ ДОМА</h1>

<div class="game-wrapper">
    <div class="game-title">ИГРА НА ЭКРАНЕ</div>
    
    <div class="screen-border" style="position: relative;">
        <canvas id="game" width="600" height="400"></canvas>
        
        <div id="overlay">
            <div class="overlay-title">⏸️ ПАУЗА</div>
            <div style="font-size: 20px; margin: 10px 0; max-width: 400px;">
                Чтобы продолжить — пошагайте на месте
            </div>
            <div style="font-size: 48px; color: #FF9F1C; margin: 20px 0;">
                50 шагов
            </div>
            <button class="resume-btn" onclick="resumeGame()">ПРОДОЛЖИТЬ 👣</button>
        </div>
    </div>
    
    <div class="controls-panel">
        <div class="control-side">
            <div style="position: relative;">
                <span class="arrow-indicator arrow-top">▲</span>
                <button class="control-btn" id="btn-left-top" 
                    onmousedown="setPosition(0)" 
                    ontouchstart="setPosition(0)"></button>
            </div>
            <div style="position: relative;">
                <button class="control-btn" id="btn-left-bottom" 
                    onmousedown="setPosition(2)" 
                    ontouchstart="setPosition(2)"></button>
                <span class="arrow-indicator arrow-bottom">▼</span>
            </div>
        </div>
        
        <div class="stats">
            <div class="stat-item">🏆 Рекорд: <span id="bestScore">0</span></div>
        </div>
        
        <div class="control-side">
            <div style="position: relative;">
                <span class="arrow-indicator arrow-top">▲</span>
                <button class="control-btn" id="btn-right-top" 
                    onmousedown="setPosition(1)" 
                    ontouchstart="setPosition(1)"></button>
            </div>
            <div style="position: relative;">
                <button class="control-btn" id="btn-right-bottom" 
                    onmousedown="setPosition(3)" 
                    ontouchstart="setPosition(3)"></button>
                <span class="arrow-indicator arrow-bottom">▼</span>
            </div>
        </div>
    </div>
</div>

<p style="margin-top: 20px; color: #2a2a2a; font-size: 14px; max-width: 500px;">
    💡 Управление: Левая сторона (Q/A) | Правая сторона (W/S) или кнопками<br>
    🎯 Лови падающие цветы — не пропусти ни одного!
</p>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let score = 0;
let lives = 3;
let bestScore = parseInt(localStorage.getItem('flowerGameBest')) || 0;
let isPaused = false;
let gameSpeed = 1;
let currentPosition = 2; // 0=левый верх, 1=правый верх, 2=левый низ, 3=правый низ

document.getElementById('bestScore').textContent = bestScore;

// Желоба (откуда падают цветы)
const lanes = [
    { x: 100, startY: 50, type: 'left' },   // Левый желоб
    { x: 500, startY: 50, type: 'right' }   // Правый желоб
];

// Позиции персонажа внизу
const catchPositions = [
    { x: 100, y: 320, lane: 0, level: 'top' },     // Левый верхний
    { x: 500, y: 320, lane: 1, level: 'top' },     // Правый верхний
    { x: 100, y: 360, lane: 0, level: 'bottom' },  // Левый нижний
    { x: 500, y: 360, lane: 1, level: 'bottom' }   // Правый нижний
];

let flowers = [];
const flowerEmojis = ['🌸', '🌺', '🌻', '🌼', '🌷', '🏵️'];

function spawnFlower() {
    if (isPaused) return;
    
    const laneIndex = Math.floor(Math.random() * 2); // 0 или 1
    const lane = lanes[laneIndex];
    const level = Math.random() > 0.5 ? 'top' : 'bottom';
    
    flowers.push({
        x: lane.x,
        y: lane.startY,
        laneIndex: laneIndex,
        level: level,
        speed: (1.5 + Math.random() * 0.5) * gameSpeed,
        emoji: flowerEmojis[Math.floor(Math.random() * flowerEmojis.length)],
        caught: false
    });
}

setInterval(spawnFlower, 1200);

// Управление клавиатурой
document.addEventListener("keydown", function(e) {
    if (isPaused) return;
    
    const key = e.key.toLowerCase();
    if (key === 'q') setPosition(0); // Левый верх
    if (key === 'a') setPosition(2); // Левый низ
    if (key === 'w') setPosition(1); // Правый верх
    if (key === 's') setPosition(3); // Правый низ
});

function setPosition(pos) {
    if (isPaused) return;
    currentPosition = pos;
}

function drawBackground() {
    // Рисуем желоба (лестницы)
    ctx.strokeStyle = '#8B6F47';
    ctx.lineWidth = 3;
    
    // Левый желоб
    ctx.beginPath();
    ctx.moveTo(80, 50);
    ctx.lineTo(120, 50);
    ctx.lineTo(120, 300);
    ctx.lineTo(80, 300);
    ctx.stroke();
    
    // Правый желоб
    ctx.beginPath();
    ctx.moveTo(480, 50);
    ctx.lineTo(520, 50);
    ctx.lineTo(520, 300);
    ctx.lineTo(480, 300);
    ctx.stroke();
    
    // Перекладины
    for (let i = 0; i < 6; i++) {
        const y = 70 + i * 40;
        ctx.beginPath();
        ctx.moveTo(80, y);
        ctx.lineTo(120, y);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(480, y);
        ctx.lineTo(520, y);
        ctx.stroke();
    }
}

function drawPlayer() {
    const pos = catchPositions[currentPosition];
    
    // Рисуем девушку с корзиной
    ctx.fillStyle = "#CF2C02";
    ctx.font = "50px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("🧺", pos.x, pos.y);
    
    // Индикатор текущей позиции
    ctx.strokeStyle = "#FF9F1C";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, 30, 0, Math.PI * 2);
    ctx.stroke();
}

function drawFlowers() {
    ctx.font = "35px Arial";
    ctx.textAlign = "center";
    
    flowers.forEach((flower, i) => {
        if (flower.caught) return;
        
        ctx.fillText(flower.emoji, flower.x, flower.y);
        flower.y += flower.speed;
        
        // Проверка поимки
        const targetPos = catchPositions.find(p => 
            p.lane === flower.laneIndex && p.level === flower.level
        );
        
        if (flower.y >= targetPos.y - 20 && flower.y <= targetPos.y + 20) {
            if (currentPosition === catchPositions.indexOf(targetPos)) {
                // Поймали!
                score++;
                flower.caught = true;
                
                if (score > bestScore) {
                    bestScore = score;
                    localStorage.setItem('flowerGameBest', bestScore);
                    document.getElementById('bestScore').textContent = bestScore;
                }
                
                // Увеличение скорости
                if (score % 10 === 0) {
                    gameSpeed += 0.1;
                }
            }
        }
        
        // Цветок упал
        if (flower.y > 390) {
            if (!flower.caught) {
                lives--;
                if (lives <= 0) {
                    pauseGame();
                }
            }
            flowers.splice(i, 1);
        }
    });
}

function drawUI() {
    // Цифровой счетчик как на оригинале
    ctx.fillStyle = "#2a2a2a";
    ctx.font = "bold 32px 'Courier New', monospace";
    ctx.textAlign = "right";
    
    const scoreStr = score.toString().padStart(4, '0');
    ctx.fillText(scoreStr, 580, 30);
    
    // Жизни (сердечки)
    ctx.font = "24px Arial";
    for (let i = 0; i < 3; i++) {
        if (i < lives) {
            ctx.fillText("❤️", 560 + (i * 25), 60);
        } else {
            ctx.fillText("🤍", 560 + (i * 25), 60);
        }
    }
}

function update() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    if (!isPaused) {
        drawBackground();
        drawFlowers();
        drawPlayer();
    }
    
    drawUI();
    requestAnimationFrame(update);
}

function pauseGame() {
    isPaused = true;
    document.getElementById("overlay").classList.add("show");
}

function resumeGame() {
    lives = 3;
    isPaused = false;
    document.getElementById("overlay").classList.remove("show");
}

update();
</script>

</body>
</html>
